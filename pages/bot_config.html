<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Config Editor</title>
<style>
  :root {
    --bg: #0b0f19;
    --surface: #131825;
    --surface2: #1a2035;
    --border: rgba(255,255,255,0.06);
    --text: #e2e8f0;
    --text-muted: #64748b;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --red: #ef4444;
    --red-soft: rgba(239,68,68,0.12);
    --green: #22c55e;
    --green-soft: rgba(34,197,94,0.12);
    --gold: #eab308;
    --gold-soft: rgba(234,179,8,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  .topbar h1 {
    font-size: 1.15rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .topbar .sep { width: 1px; height: 24px; background: var(--border); }
  .topbar a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    transition: color 0.15s;
  }
  .topbar a:hover { color: var(--text); }

  .select-wrap { position: relative; }
  .select-wrap select {
    appearance: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 40px 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 0.9rem;
    min-width: 320px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .select-wrap select:hover { border-color: var(--accent); }
  .select-wrap select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
  .select-wrap::after {
    content: '';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    border: 5px solid transparent;
    border-top-color: var(--text-muted);
    pointer-events: none;
  }

  .main { max-width: 900px; margin: 0 auto; padding: 32px 24px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: visible;
    margin-bottom: 20px;
  }
  .card-header {
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .card-header h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    transition: all 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
  .btn-primary:disabled { opacity: 0.5; pointer-events: none; }

  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--text-muted);
  }
  .empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
  .empty p { font-size: 0.9rem; }

  /* --- Section --- */
  .section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }

  /* --- Grid layouts --- */
  .grid { display: grid; gap: 14px; }
  .grid.two-cols { grid-template-columns: 1fr 1fr; }
  @media (max-width: 768px) { .grid.two-cols { grid-template-columns: 1fr; } }

  /* --- Form field --- */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }
  .field input[type="text"],
  .field input[type="number"],
  .field select {
    width: 100%;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 0.875rem;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    transition: border-color 0.15s;
  }
  .field input:focus,
  .field select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  .field input.changed,
  .field select.changed {
    border-color: var(--accent);
    background: rgba(99,102,241,0.06);
  }

  /* --- Multi-select for maps --- */
  .map-select-wrap { position: relative; }
  .map-select-btn {
    width: 100%;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 0.85rem;
    text-align: left;
    cursor: pointer;
    transition: border-color 0.15s;
    min-height: 40px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }
  .map-select-btn:hover { border-color: var(--accent); }
  .map-select-btn.changed { border-color: var(--accent); background: rgba(99,102,241,0.06); }
  .map-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(99,102,241,0.15);
    color: var(--accent-hover);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .map-placeholder { color: var(--text-muted); }
  .map-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    max-height: 280px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .map-dropdown.open { display: block; }
  .map-option {
    padding: 10px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.1s;
  }
  .map-option:hover { background: rgba(99,102,241,0.08); }
  .map-option .check {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .map-option.selected .check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .map-option.selected .check::after {
    content: '';
    width: 5px;
    height: 9px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) translateY(-1px);
  }
  .map-option .map-label { flex: 1; }
  .map-option .map-code {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* --- Toggle switch --- */
  .checks {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px 16px;
  }
  @media (max-width: 768px) { .checks { grid-template-columns: 1fr; } }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
  }
  .toggle-row label {
    font-size: 0.85rem;
    color: var(--text);
    cursor: pointer;
    user-select: none;
  }

  .toggle {
    position: relative;
    width: 40px;
    height: 22px;
    flex-shrink: 0;
  }
  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }
  .toggle .slider {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 22px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle .slider::before {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    left: 2px;
    bottom: 2px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle input:checked + .slider {
    background: var(--accent);
    border-color: var(--accent);
  }
  .toggle input:checked + .slider::before {
    transform: translateX(18px);
    background: #fff;
  }
  .toggle.changed .slider {
    box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
  }

  /* --- Toast --- */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #fff;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    font-weight: 600;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    z-index: 300;
    pointer-events: none;
  }
  .toast.error { background: var(--red); }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <h1>Bot Config Editor</h1>
  <div class="sep"></div>
  <a href="/">Map Manager</a>
  <div class="sep"></div>
  <div class="select-wrap">
    <select id="fileSelect"><option value="">Select a config file...</option></select>
  </div>
  <button class="btn btn-primary" id="btnSave" style="display:none;" onclick="saveConfig()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save Changes
  </button>
</div>

<div class="main" id="settingsWrap">
  <div class="card">
    <div class="card-header"><h2>Settings</h2></div>
    <div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <p>Select a config file to edit its settings</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let currentFile = null;
let originalValues = {};
let form = {};

// --- Known maps for multi-select (loaded from API) ---
let KNOWN_MAPS = [];
let knownCodes = new Set();

async function loadKnownMaps() {
  try {
    const res = await fetch(`${API}/api/maps`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const maps = await res.json();
    KNOWN_MAPS = maps.map(m => ({ code: m.mapId, name: m.name, redCount: m.redCount || 0, goldenCount: m.goldenCount || 0 }))
      .sort((a, b) => a.name.localeCompare(b.name));
    knownCodes = new Set(KNOWN_MAPS.map(m => m.code));
  } catch (e) {
    console.error('Failed to load maps:', e);
  }
}

// --- Field metadata ---
const FIELD_META = {
  PORT:          { label: 'Port',          type: 'text' },
  IGN:           { label: 'IGN',           type: 'text' },
  MAP:           { label: 'Map(s)',        type: 'map-select' },
  CHANNELS:      { label: 'Channels (comma-separated)', type: 'text' },
  IGNORE_NAME:   { label: 'Ignore Name',  type: 'bool' },
  USE_TELEPORT:  { label: 'Use Teleport', type: 'bool' },
  ENGAGE_RED_BOSS:    { label: 'Engage Red Boss',    type: 'bool' },
  ENGAGE_GOLDEN_BOSS: { label: 'Engage Golden Boss', type: 'bool' },
  RADIUS_SEARCH:      { label: 'Radius Search',      type: 'number' },
  THRESHOLD_DMG_RED:  { label: 'Threshold DMG Red (Buff)',  type: 'number' },
  SKIP_NAMES:    { label: 'Skip Names (comma-separated)', type: 'text' },
  DEBUG:         { label: 'Debug',         type: 'bool' },
  RESTART_AFTER_MINUTES: { label: 'Restart After Minutes', type: 'number' },
  ON_WALK_MODE_GO_TO_STARTING_POINT: { label: 'Walk Mode: Go to Start', type: 'bool' },
  RETRY_COUNT_READ_LIFE_FAILS: { label: 'Retry Count (Read Life Fails)', type: 'number' },
  DETECT_LOW_LIFE:    { label: 'Detect Low Life',    type: 'bool' },
  TAP_ON_MAP_WHILE_WALKING: { label: 'Tap on Map While Walking', type: 'bool' },
  IS_BUFFER:     { label: 'Buffer Mode',   type: 'bool' },
  BUFFER:        { label: 'Buffer',        type: 'text' },
  BUFFER_MAP:    { label: 'Buffer Map',    type: 'select', options: ['ENDLESS_ABYSS', 'DIVINE', 'CORRIDOR_OF_AGONY'] },
  BUFFER_COORDINATE:  { label: 'Buffer Coordinate', type: 'text', placeholder: 'e.g. 857,525' },
  DEBUFF_BEFORE_BUFF: { label: 'Debuff Before Buff', type: 'bool' },
  BUFFER_WHITELIST_NAMES:  { label: 'Buffer Whitelist - Names (comma-separated)',  type: 'text' },
  BUFFER_WHITELIST_GUILDS: { label: 'Buffer Whitelist - Guilds (comma-separated)', type: 'text' },
  AFK_MODE:      { label: 'AFK Mode',      type: 'bool' },
  TAP_SKILL_CANCEL_ATTACK_COORDS: { label: 'Skill Cancel Attack Coords', type: 'text', placeholder: 'e.g. 84.0,76.0' },
  ADB_SHOW_TAP: { label: 'ADB Show Tap', type: 'bool' },
};

// --- Sections & conditional logic ---
const SECTIONS = [
  {
    title: 'Mode Selection',
    show: () => true,
    fields: ['AFK_MODE', 'IS_BUFFER'],
    layout: 'checks',
  },
  {
    title: 'Identity / Connection',
    show: () => true,
    fields: ['PORT', 'IGN'],
    layout: 'two-cols',
  },
  {
    title: 'Map Configuration',
    show: () => !toBool(form.AFK_MODE) && !toBool(form.IS_BUFFER),
    fields: ['MAP', 'CHANNELS'],
    layout: 'grid',
  },
  {
    title: 'Combat Settings',
    show: () => !toBool(form.AFK_MODE) && !toBool(form.IS_BUFFER),
    fields: ['SKIP_NAMES', 'RADIUS_SEARCH', 'THRESHOLD_DMG_RED', 'RETRY_COUNT_READ_LIFE_FAILS'],
    layout: 'grid',
  },
  {
    title: 'Feature Toggles',
    show: () => !toBool(form.AFK_MODE) && !toBool(form.IS_BUFFER),
    fields: ['IGNORE_NAME', 'USE_TELEPORT', 'ENGAGE_RED_BOSS', 'ENGAGE_GOLDEN_BOSS', 'DEBUG',
             'ON_WALK_MODE_GO_TO_STARTING_POINT', 'DETECT_LOW_LIFE', 'TAP_ON_MAP_WHILE_WALKING'],
    layout: 'checks',
  },
  {
    title: 'General Settings',
    show: () => !toBool(form.AFK_MODE),
    fields: ['RESTART_AFTER_MINUTES', 'TAP_SKILL_CANCEL_ATTACK_COORDS', 'ADB_SHOW_TAP', 'BUFFER_MAP'],
    layout: 'two-cols',
  },
  {
    title: 'Buffer Settings',
    show: () => toBool(form.IS_BUFFER) && !toBool(form.AFK_MODE),
    fields: ['BUFFER', 'BUFFER_COORDINATE', 'DEBUFF_BEFORE_BUFF',
             'BUFFER_WHITELIST_NAMES', 'BUFFER_WHITELIST_GUILDS'],
    layout: 'grid',
  },
];

function toBool(v) {
  return String(v).toLowerCase() === 'true';
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- Load files ---
async function loadFiles() {
  const res = await fetch(`${API}/api/config/files`);
  const files = await res.json();
  const sel = document.getElementById('fileSelect');
  sel.innerHTML = '<option value="">Select a config file...</option>';
  files.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f;
    opt.textContent = f;
    sel.appendChild(opt);
  });
}

document.getElementById('fileSelect').addEventListener('change', e => {
  currentFile = e.target.value || null;
  if (currentFile) {
    loadConfig(currentFile);
  } else {
    document.getElementById('settingsWrap').innerHTML =
      '<div class="card"><div class="card-header"><h2>Settings</h2></div><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg><p>Select a config file to edit its settings</p></div></div>';
    document.getElementById('btnSave').style.display = 'none';
  }
});

async function loadConfig(filename) {
  const res = await fetch(`${API}/api/config/files/${encodeURIComponent(filename)}`);
  const data = await res.json();
  originalValues = {};
  form = {};
  data.settings.forEach(s => {
    originalValues[s.key] = s.value;
    form[s.key] = s.value;
  });
  renderForm();
  document.getElementById('btnSave').style.display = '';
}

// --- Render the full form ---
function renderForm() {
  const wrap = document.getElementById('settingsWrap');
  let html = '';

  for (const sec of SECTIONS) {
    if (!sec.show()) continue;
    // Skip sections where none of the fields exist in the config
    const hasFields = sec.fields.some(k => k in form);
    if (!hasFields) continue;

    html += `<div class="card"><div class="card-header"><h2>${sec.title}</h2></div>`;

    if (sec.layout === 'checks') {
      html += '<div class="section"><div class="checks">';
      for (const key of sec.fields) {
        if (!(key in form)) continue;
        const meta = FIELD_META[key] || { label: key, type: 'text' };
        const checked = toBool(form[key]);
        const changed = form[key] !== originalValues[key];
        html += `<div class="toggle-row">
          <div class="toggle ${changed ? 'changed' : ''}">
            <input type="checkbox" id="f_${key}" data-key="${key}" ${checked ? 'checked' : ''} onchange="onToggle(this)">
            <span class="slider"></span>
          </div>
          <label for="f_${key}">${esc(meta.label)}</label>
        </div>`;
      }
      html += '</div></div>';
    } else {
      const gridClass = sec.layout === 'two-cols' ? 'grid two-cols' : 'grid';
      html += `<div class="section"><div class="${gridClass}">`;
      for (const key of sec.fields) {
        if (!(key in form)) continue;
        const meta = FIELD_META[key] || { label: key, type: 'text' };

        if (meta.type === 'bool') {
          const checked = toBool(form[key]);
          const changed = form[key] !== originalValues[key];
          html += `<div class="field"><label>${esc(meta.label)}</label>
            <div class="toggle-row">
              <div class="toggle ${changed ? 'changed' : ''}">
                <input type="checkbox" id="f_${key}" data-key="${key}" ${checked ? 'checked' : ''} onchange="onToggle(this)">
                <span class="slider"></span>
              </div>
            </div>
          </div>`;
        } else if (meta.type === 'map-select') {
          html += renderMapSelect(key, meta);
        } else if (meta.type === 'select') {
          const changed = form[key] !== originalValues[key];
          let opts = meta.options.map(o => `<option value="${esc(o)}" ${form[key] === o ? 'selected' : ''}>${esc(o)}</option>`).join('');
          html += `<div class="field">
            <label>${esc(meta.label)}</label>
            <select id="f_${key}" data-key="${key}" class="${changed ? 'changed' : ''}" onchange="onInput(this)">
              ${opts}
            </select>
          </div>`;
        } else {
          const inputType = meta.type === 'number' ? 'number' : 'text';
          const changed = form[key] !== originalValues[key];
          const ph = meta.placeholder ? ` placeholder="${esc(meta.placeholder)}"` : '';
          html += `<div class="field">
            <label>${esc(meta.label)}</label>
            <input type="${inputType}" id="f_${key}" data-key="${key}" value="${esc(form[key])}" class="${changed ? 'changed' : ''}" oninput="onInput(this)"${ph}>
          </div>`;
        }
      }
      html += '</div></div>';
    }
    html += '</div>';
  }

  // Any unknown keys that aren't in SECTIONS
  const allSectionKeys = new Set(SECTIONS.flatMap(s => s.fields));
  const unknownKeys = Object.keys(form).filter(k => !allSectionKeys.has(k));
  if (unknownKeys.length) {
    html += '<div class="card"><div class="card-header"><h2>Other Settings</h2></div><div class="section"><div class="grid">';
    for (const key of unknownKeys) {
      const changed = form[key] !== originalValues[key];
      html += `<div class="field">
        <label>${esc(key)}</label>
        <input type="text" data-key="${key}" value="${esc(form[key])}" class="${changed ? 'changed' : ''}" oninput="onInput(this)">
      </div>`;
    }
    html += '</div></div></div>';
  }

  wrap.innerHTML = html;
}

// --- Map multi-select ---
function renderMapSelect(key, meta) {
  const selected = form[key] ? form[key].split(',').map(s => s.trim()).filter(Boolean) : [];
  const changed = form[key] !== originalValues[key];

  let tagsHtml = '';
  if (selected.length) {
    selected.forEach(code => {
      const m = KNOWN_MAPS.find(km => km.code === code);
      tagsHtml += `<span class="map-tag">${esc(m ? m.name : code)} (${esc(code)})</span>`;
    });
  } else {
    tagsHtml = '<span class="map-placeholder">Select maps...</span>';
  }

  let optionsHtml = '';
  KNOWN_MAPS.forEach(m => {
    const sel = selected.includes(m.code);
    const counts = m.redCount || m.goldenCount
      ? ` <span style="opacity:.6;font-size:.85em">(R:${m.redCount} G:${m.goldenCount})</span>` : '';
    optionsHtml += `<div class="map-option ${sel ? 'selected' : ''}" data-code="${esc(m.code)}" onclick="toggleMapOption(this)">
      <div class="check"></div>
      <span class="map-label">${esc(m.name)}${counts}</span>
      <span class="map-code">${esc(m.code)}</span>
    </div>`;
  });

  return `<div class="field">
    <label>${esc(meta.label)}</label>
    <div class="map-select-wrap" id="mapSelectWrap">
      <div class="map-select-btn ${changed ? 'changed' : ''}" onclick="toggleMapDropdown()">${tagsHtml}</div>
      <div class="map-dropdown" id="mapDropdown">${optionsHtml}</div>
    </div>
  </div>`;
}

function toggleMapDropdown() {
  const dd = document.getElementById('mapDropdown');
  dd.classList.toggle('open');
}

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  const wrap = document.getElementById('mapSelectWrap');
  if (wrap && !wrap.contains(e.target)) {
    const dd = document.getElementById('mapDropdown');
    if (dd) dd.classList.remove('open');
  }
});

function toggleMapOption(el) {
  const code = el.dataset.code;
  let selected = form.MAP ? form.MAP.split(',').map(s => s.trim()).filter(Boolean) : [];

  // Preserve unknown codes
  const unknownCodes = selected.filter(c => !knownCodes.has(c));

  if (selected.includes(code)) {
    selected = selected.filter(c => c !== code);
  } else {
    selected.push(code);
  }

  // Ensure unknown codes stay
  unknownCodes.forEach(uc => {
    if (!selected.includes(uc)) selected.push(uc);
  });

  form.MAP = selected.join(',');
  renderForm();
}

// --- Input handlers ---
function onInput(el) {
  const key = el.dataset.key;
  form[key] = el.value;
  if (el.value !== originalValues[key]) {
    el.classList.add('changed');
  } else {
    el.classList.remove('changed');
  }
}

function onToggle(el) {
  const key = el.dataset.key;
  const val = el.checked ? 'true' : 'false';
  form[key] = val;

  // Mutual exclusivity: AFK_MODE and IS_BUFFER
  if (key === 'AFK_MODE' && el.checked && 'IS_BUFFER' in form) {
    form.IS_BUFFER = 'false';
  }
  if (key === 'IS_BUFFER' && el.checked && 'AFK_MODE' in form) {
    form.AFK_MODE = 'false';
  }

  renderForm();
}

// --- Save ---
async function saveConfig() {
  const updates = {};
  for (const key of Object.keys(form)) {
    if (form[key] !== originalValues[key]) {
      updates[key] = form[key];
    }
  }

  if (Object.keys(updates).length === 0) {
    toast('No changes to save');
    return;
  }

  const res = await fetch(`${API}/api/config/files/${encodeURIComponent(currentFile)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ settings: updates }),
  });

  if (!res.ok) {
    const err = await res.json();
    toast(err.error || 'Failed to save', true);
    return;
  }

  Object.assign(originalValues, updates);
  renderForm();
  toast('Config saved');
}

loadFiles();
loadKnownMaps();
</script>
</body>
</html>
